name: News Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # كل 5 دقائق
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: سحب المشروع
        uses: actions/checkout@v3

      - name: تثبيت بايثون
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: تشغيل البوت
        run: python main.py


        - name: حفظ البيانات
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add sent_posts.json
          git commit -m "update data" || echo "no changes"
          git push
