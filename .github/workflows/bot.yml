name: News Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # سحب المشروع
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # تثبيت بايثون
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # تثبيت المكتبات
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # تشغيل البوت
      - name: Run bot
        run: python main.py

      # حفظ البيانات (منع التكرار)
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sent_posts.json || echo "no file"

          git commit -m "update sent posts" || echo "no changes"

          git push
